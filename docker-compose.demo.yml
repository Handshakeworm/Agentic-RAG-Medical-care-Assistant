# docker-compose.demo.yml — G7 演示用 override(DEV_SPEC §8.4 G7)。
#
# ⚠️ DEPRECATED 自 J0(2026-05-14):`infra/docker/Dockerfile.api` 已完工,
#    主 compose 直接 `docker compose up -d` 就能跑全栈(api 容器 + nginx)。
#    本 override 只在"想用 host 上的 uvicorn 接前端 hot-reload 调试"时才有用,
#    不再是常规启动路径。新同事直接看主 docker-compose.yml + README §快速开始。
#
# 历史用途:J0 完工前,host 跑 uvicorn,nginx 容器反代到 host。
# 原 docker-compose.yml + nginx.conf 完全不动,J0 无缝继承。
#
# 用法(仅热重载调试场景):
#   1. host 跑 uvicorn:
#        uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload
#   2. 起 nginx + 依赖:
#        docker compose -f docker-compose.yml -f docker-compose.demo.yml up -d nginx
#   3. 验证:
#        curl http://localhost:80/auth/me  (应返 401 缺 token)
#
# 关键技巧:
# - depends_on: !reset [] 把主 compose 里 "依赖 api healthy" 的硬约束清掉
# - extra_hosts api:host-gateway 让 nginx 容器内 "api" 这个 hostname 解析到
#   宿主机网关,nginx.conf 里 `server api:8000` 不需要改,转发到 host:8000
#   宿主机 uvicorn

services:
  nginx:
    depends_on: !reset []
    extra_hosts:
      - "api:host-gateway"
