; Alembic 配置(DEV_SPEC §8.4 B2)。
;
; 设计取舍:
; - script_location 指向 src/db/postgres/alembic(与现有 ORM 同根,不在项目顶层散落)
; - sqlalchemy.url 留空,实际 DSN 由 env.py 从 config.settings 注入(单一源,
;   不在 .ini 里重复硬编码)
; - 不开启 file_template 重命名 —— 用我们自己的语义化文件名,不用 Alembic 默认的
;   datestamp 风格(对 spec-driven 项目难追溯)

[alembic]
script_location = src/db/postgres/alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
