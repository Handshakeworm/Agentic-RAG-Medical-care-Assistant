# Nginx 反向代理(DEV_SPEC §8.4 G7)。
# 转发 80 → api:8000,docker-compose 里 nginx 已挂载本文件并 depends_on api healthy。
#
# 关键配置说明(用 # 标注 why,不是 what):
# - client_max_body_size 50M — exam_reports 上传 PDF/影像、知识库上传 PDF 教材
# - proxy_read_timeout 600s — LLM 单轮推理 + RAG 检索 + interrupt resume 慢路径
#                             一次问诊真实上限 ~5 分钟,timeout 必须 > 实际处理时间
# - X-Real-IP / X-Forwarded-For — 让限流中间件 (G3) 拿到真实客户端 IP,
#                                  否则全是 nginx 容器 IP,IP 桶失效
# - X-Forwarded-Proto — FastAPI 生成 redirect URL / OpenAPI scheme 用,HTTPS 时必传
#
# **不在本任务范围**:
# - HTTPS / TLS — 生产再接 Let's Encrypt 或前置 LB,本期演示 HTTP 即可
# - rate limit at nginx — G3/H6 在应用层做,nginx 这层只转
# - gzip — FastAPI 响应小,不用
# - 静态文件 — 没前端 SPA,/docs 是 FastAPI 自带

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 真实 IP 透传到 upstream,G3 限流中间件 _key_for_request 才能拿到正确 client.host
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    upstream fastapi_upstream {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # 主转发 — 全部路径走 FastAPI(/auth /diagnose /patients /admin /metrics /docs)
        location / {
            proxy_pass http://fastapi_upstream;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # 透传客户端真实信息
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # LLM + RAG 慢路径 timeout
            proxy_connect_timeout 30s;
            proxy_send_timeout    600s;
            proxy_read_timeout    600s;
        }

        # nginx 自己的健康检查端点(给外部 LB / docker healthcheck 用)
        # 不转 FastAPI,内嵌返 200 — H8 实现 /healthz /readyz 后,
        # 外部 LB 也可以直接探 fastapi 的端点
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
